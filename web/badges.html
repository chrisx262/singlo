<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Singlo 🥋 – Belt Journey</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --pink:#FF4F91; --yellow:#FFD93D; --teal:#00C9A7;
  --purple:#7B61FF; --orange:#FF7043; --dark:#1A1A2E;
  --card:rgba(255,255,255,0.06); --radius:22px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Nunito',sans-serif; background:var(--dark); color:#fff; min-height:100vh; overflow-x:hidden; }

.bg { position:fixed; inset:0; z-index:0; overflow:hidden; }
.blob { position:absolute; border-radius:50%; filter:blur(90px); opacity:0.18; animation:float 9s ease-in-out infinite; }
.b1 { width:450px;height:450px;background:var(--purple);top:-130px;right:-80px; }
.b2 { width:320px;height:320px;background:var(--teal);bottom:-80px;left:-60px;animation-delay:3s; }
.b3 { width:200px;height:200px;background:var(--yellow);top:50%;left:30%;animation-delay:1.5s; }
@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-22px)} }

.wrapper { position:relative; z-index:2; max-width:480px; margin:0 auto; padding:22px 16px 100px; }

/* Header */
header { display:flex; align-items:center; justify-content:space-between; margin-bottom:24px; }
.back-btn {
  width:40px; height:40px; border-radius:12px;
  background:var(--card); border:1.5px solid rgba(255,255,255,0.1);
  display:flex; align-items:center; justify-content:center;
  font-size:1.1rem; cursor:pointer; text-decoration:none; color:#fff;
}
.page-title {
  font-family:'Fredoka One',cursive; font-size:1.4rem;
  background:linear-gradient(135deg,var(--yellow),var(--orange));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
}
.xp-pill {
  background:rgba(255,217,61,0.15); border:1.5px solid rgba(255,217,61,0.35);
  border-radius:50px; padding:5px 14px;
  font-size:0.8rem; font-weight:800; color:var(--yellow);
}

/* Current belt hero card */
.belt-hero {
  border-radius:var(--radius); padding:26px 22px;
  margin-bottom:20px; position:relative; overflow:hidden;
  border:2px solid rgba(255,255,255,0.1);
  animation:fadeUp 0.5s ease both;
}
.hero-glow {
  position:absolute; inset:0; pointer-events:none;
  background:radial-gradient(circle at 75% 50%, var(--bc, transparent), transparent 65%);
  opacity:0.2;
}
.belt-row { display:flex; align-items:center; gap:18px; margin-bottom:18px; }
.belt-icon {
  width:72px; height:72px; border-radius:18px;
  display:flex; align-items:center; justify-content:center;
  font-size:2.4rem; flex-shrink:0;
  box-shadow:0 4px 24px rgba(0,0,0,0.4);
}
.belt-info { flex:1; }
.belt-rank { font-size:0.68rem; font-weight:900; letter-spacing:2px; text-transform:uppercase; color:rgba(255,255,255,0.4); margin-bottom:4px; }
.belt-name { font-family:'Fredoka One',cursive; font-size:1.7rem; line-height:1.1; margin-bottom:4px; }
.belt-tagline { font-size:0.8rem; font-weight:700; color:rgba(255,255,255,0.5); }

.prog-label { display:flex; justify-content:space-between; font-size:0.72rem; font-weight:800; color:rgba(255,255,255,0.4); margin-bottom:7px; }
.prog-track { height:10px; background:rgba(255,255,255,0.09); border-radius:50px; overflow:hidden; }
.prog-fill { height:100%; border-radius:50px; transition:width 1.2s ease; }

.stats-row { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-top:16px; }
.stat-box { text-align:center; background:rgba(255,255,255,0.07); border-radius:14px; padding:10px 6px; }
.stat-val { font-family:'Fredoka One',cursive; font-size:1.2rem; color:var(--yellow); }
.stat-lbl { font-size:0.62rem; font-weight:800; color:rgba(255,255,255,0.4); text-transform:uppercase; letter-spacing:0.5px; }

/* Belt grid */
.section-label { font-size:0.7rem; font-weight:800; letter-spacing:2px; text-transform:uppercase; color:rgba(255,255,255,0.32); margin-bottom:14px; }
.belt-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:28px; animation:fadeUp 0.5s 0.1s ease both; }

.belt-card {
  background:var(--card); border:1.5px solid rgba(255,255,255,0.07);
  border-radius:18px; padding:16px 10px; text-align:center;
  transition:all 0.25s; position:relative; overflow:hidden;
}
.belt-card:hover { transform:translateY(-3px); }
.belt-card.locked { opacity:0.35; filter:grayscale(0.5); }

.bc-icon { font-size:2rem; display:block; margin-bottom:7px; }
.bc-name { font-family:'Fredoka One',cursive; font-size:0.82rem; line-height:1.2; margin-bottom:4px; }
.bc-xp { font-size:0.62rem; font-weight:800; color:rgba(255,255,255,0.38); }
.bc-xp.earned { color:var(--teal); }

.now-tag {
  position:absolute; top:7px; right:7px;
  background:var(--yellow); color:var(--dark);
  font-size:0.5rem; font-weight:900; letter-spacing:1px;
  padding:2px 7px; border-radius:50px; text-transform:uppercase;
  animation:pulse-tag 2s ease-in-out infinite;
}
@keyframes pulse-tag { 0%,100%{transform:scale(1)} 50%{transform:scale(1.08)} }

/* Bottom nav */
.bottom-nav {
  position:fixed; bottom:0; left:50%; transform:translateX(-50%);
  width:100%; max-width:480px;
  background:rgba(26,26,46,0.95); backdrop-filter:blur(20px);
  border-top:1px solid rgba(255,255,255,0.07);
  display:flex; justify-content:space-around;
  padding:12px 0 18px; z-index:100;
}
.nav-item { display:flex; flex-direction:column; align-items:center; gap:4px; cursor:pointer; padding:0 16px; opacity:0.4; transition:opacity 0.2s; }
.nav-item.active { opacity:1; }
.nav-icon { font-size:1.35rem; }
.nav-label { font-size:0.6rem; font-weight:900; letter-spacing:0.5px; text-transform:uppercase; }
.nav-item.active .nav-label { color:var(--yellow); }

/* Promotion modal */
.promo-overlay {
  position:fixed; inset:0; z-index:300;
  display:flex; align-items:center; justify-content:center;
  background:rgba(0,0,0,0.82); backdrop-filter:blur(14px);
  opacity:0; pointer-events:none; transition:opacity 0.3s;
}
.promo-overlay.show { opacity:1; pointer-events:all; }
.promo-card {
  background:#1e1e38; border-radius:28px;
  border:2px solid rgba(255,255,255,0.12);
  padding:38px 28px; text-align:center;
  width:90%; max-width:360px;
  transform:scale(0.82); transition:transform 0.45s cubic-bezier(0.34,1.56,0.64,1);
}
.promo-overlay.show .promo-card { transform:scale(1); }
.promo-icon { font-size:5.5rem; display:block; margin-bottom:12px; animation:popIn 0.5s 0.2s ease both; }
@keyframes popIn { 0%{transform:scale(0) rotate(-20deg)} 80%{transform:scale(1.15) rotate(5deg)} 100%{transform:scale(1) rotate(0)} }
.promo-title { font-family:'Fredoka One',cursive; font-size:2rem; margin-bottom:6px; }
.promo-sub { color:rgba(255,255,255,0.6); font-size:0.88rem; font-weight:700; margin-bottom:24px; line-height:1.5; }
.promo-btn {
  width:100%; padding:15px; border:none; border-radius:16px;
  font-family:'Fredoka One',cursive; font-size:1.1rem; cursor:pointer;
  color:#fff; background:linear-gradient(135deg,var(--pink),var(--purple));
  box-shadow:0 6px 20px rgba(255,79,145,0.4); transition:transform 0.2s;
}
.promo-btn:hover { transform:translateY(-2px); }

/* Particles */
.particle { position:fixed; width:9px; height:9px; border-radius:2px; pointer-events:none; z-index:400; animation:fall 1.9s ease-in forwards; }
@keyframes fall { 0%{opacity:1;transform:translateY(-10px) rotate(0)} 100%{opacity:0;transform:translateY(100vh) rotate(720deg)} }
@keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
</style>
</head>
<body>

<div class="bg"><div class="blob b1"></div><div class="blob b2"></div><div class="blob b3"></div></div>

<div class="wrapper">

  <header>
    <a href="index.html" class="back-btn">←</a>
    <div class="page-title">🥋 Belt Journey</div>
    <div class="xp-pill" id="xpPill">0 XP</div>
  </header>

  <div class="belt-hero" id="beltHero">
    <div class="hero-glow" id="heroGlow"></div>
    <div class="belt-row">
      <div class="belt-icon" id="heroIcon">🤍</div>
      <div class="belt-info">
        <div class="belt-rank" id="heroRank">RANK 1 OF 9</div>
        <div class="belt-name" id="heroName">White Belt</div>
        <div class="belt-tagline" id="heroTagline">Every master started here</div>
      </div>
    </div>
    <div class="prog-label">
      <span id="progLabel">Progress to Yellow Belt</span>
      <span id="progPct">0%</span>
    </div>
    <div class="prog-track"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
    <div class="stats-row">
      <div class="stat-box"><div class="stat-val" id="statXP">0</div><div class="stat-lbl">Total XP</div></div>
      <div class="stat-box"><div class="stat-val" id="statSessions">0</div><div class="stat-lbl">Sessions</div></div>
      <div class="stat-box"><div class="stat-val" id="statStreak">0s</div><div class="stat-lbl">Best Streak</div></div>
    </div>
  </div>

  <div class="section-label">All 9 Belts</div>
  <div class="belt-grid" id="beltGrid"></div>

</div>

<nav class="bottom-nav">
  <div class="nav-item" onclick="location.href='index.html'"><div class="nav-icon">🏠</div><div class="nav-label">Home</div></div>
  <div class="nav-item" onclick="location.href='pitch.html'"><div class="nav-icon">🎯</div><div class="nav-label">Practice</div></div>
  <div class="nav-item active"><div class="nav-icon">🥋</div><div class="nav-label">Belts</div></div>
  <div class="nav-item"><div class="nav-icon">🌐</div><div class="nav-label">Community</div></div>
  <div class="nav-item"><div class="nav-icon">👤</div><div class="nav-label">Profile</div></div>
</nav>

<div class="promo-overlay" id="promoOverlay">
  <div class="promo-card">
    <span class="promo-icon" id="promoIcon">💛</span>
    <div class="promo-title" id="promoTitle">Yellow Belt!</div>
    <div class="promo-sub" id="promoSub">You've earned it. Keep training!</div>
    <button class="promo-btn" onclick="closePromo()">Keep Training 🔥</button>
  </div>
</div>

<script>
const BELTS = [
  { name:'White Belt',  emoji:'🤍', color:'#c8c8e8', xp:0,     tagline:'Every master started here',         next:'Yellow Belt' },
  { name:'Yellow Belt', emoji:'💛', color:'#FFD93D', xp:200,   tagline:'Finding your voice',                next:'Orange Belt' },
  { name:'Orange Belt', emoji:'🧡', color:'#FF7043', xp:500,   tagline:'Warming up the range',              next:'Green Belt'  },
  { name:'Green Belt',  emoji:'💚', color:'#4CAF50', xp:1200,  tagline:'In key more than out',              next:'Blue Belt'   },
  { name:'Blue Belt',   emoji:'💙', color:'#3D9EFF', xp:2500,  tagline:'Tone is getting consistent',        next:'Purple Belt' },
  { name:'Purple Belt', emoji:'💜', color:'#7B61FF', xp:5000,  tagline:'Advanced control unlocked',         next:'Red Belt'    },
  { name:'Red Belt',    emoji:'❤️', color:'#F44336', xp:10000, tagline:'Powerful breath, powerful voice',   next:'Brown Belt'  },
  { name:'Brown Belt',  emoji:'🤎', color:'#8D5524', xp:20000, tagline:'Near-professional technique',       next:'Black Belt'  },
  { name:'Black Belt',  emoji:'🖤', color:'#9b9bc8', xp:40000, tagline:'Master of the voice',              next:null          },
];

function loadProgress() {
  try { return JSON.parse(localStorage.getItem('singlo_progress')) || {}; } catch { return {}; }
}

function beltIdx(xp) {
  let b = 0;
  for (let i = 0; i < BELTS.length; i++) { if (xp >= BELTS[i].xp) b = i; }
  return b;
}

function render() {
  const p   = loadProgress();
  const xp  = p.xp || 0;
  const bi  = beltIdx(xp);
  const b   = BELTS[bi];
  const nxt = BELTS[bi + 1];

  document.getElementById('xpPill').textContent = xp.toLocaleString() + ' XP';
  document.getElementById('heroIcon').textContent   = b.emoji;
  document.getElementById('heroIcon').style.background = b.color + '30';
  document.getElementById('heroName').textContent   = b.name;
  document.getElementById('heroRank').textContent   = `RANK ${bi + 1} OF 9`;
  document.getElementById('heroTagline').textContent = b.tagline;
  document.getElementById('heroGlow').style.setProperty('--bc', b.color);
  document.getElementById('beltHero').style.borderColor = b.color + '60';

  document.getElementById('statXP').textContent       = xp.toLocaleString();
  document.getElementById('statSessions').textContent  = p.sessions || 0;
  document.getElementById('statStreak').textContent    = (p.bestStreak || 0) + 's';

  if (nxt) {
    const pct = Math.min(100, Math.round(((xp - b.xp) / (nxt.xp - b.xp)) * 100));
    document.getElementById('progLabel').textContent = `Progress to ${nxt.name}`;
    document.getElementById('progPct').textContent   = pct + '%';
    setTimeout(() => {
      document.getElementById('progFill').style.width      = pct + '%';
      document.getElementById('progFill').style.background = `linear-gradient(90deg,${b.color},${nxt.color})`;
    }, 100);
  } else {
    document.getElementById('progLabel').textContent = 'Grand Master achieved! 🏆';
    document.getElementById('progPct').textContent   = '100%';
    document.getElementById('progFill').style.width  = '100%';
    document.getElementById('progFill').style.background = 'linear-gradient(90deg,#9b9bc8,#fff)';
  }

  const grid = document.getElementById('beltGrid');
  grid.innerHTML = '';
  BELTS.forEach((belt, i) => {
    const unlocked = xp >= belt.xp;
    const isCurrent = i === bi;
    const card = document.createElement('div');
    card.className = 'belt-card' + (!unlocked ? ' locked' : '');
    if (isCurrent) { card.style.borderColor = belt.color; card.style.borderWidth = '2px'; }
    if (unlocked)  card.style.background = belt.color + '1a';
    card.innerHTML = `
      ${isCurrent ? '<div class="now-tag">NOW</div>' : ''}
      <span class="bc-icon">${belt.emoji}</span>
      <div class="bc-name">${belt.name}</div>
      <div class="bc-xp ${unlocked ? 'earned' : ''}">${unlocked ? '✓ Earned' : belt.xp.toLocaleString() + ' XP'}</div>
    `;
    grid.appendChild(card);
  });

  // Promotion triggered from pitch.html
  const params = new URLSearchParams(location.search);
  const promoted = params.get('promoted');
  if (promoted !== null) {
    setTimeout(() => showPromo(parseInt(promoted)), 500);
  }
}

function showPromo(bi) {
  const b = BELTS[bi];
  if (!b) return;
  document.getElementById('promoIcon').textContent  = b.emoji;
  document.getElementById('promoTitle').textContent = b.name + ' Unlocked!';
  document.getElementById('promoSub').textContent   = b.tagline + '. Your hard work is paying off!';
  document.getElementById('promoOverlay').classList.add('show');
  confetti();
}

function closePromo() {
  document.getElementById('promoOverlay').classList.remove('show');
  history.replaceState({}, '', 'badges.html');
}

function confetti() {
  const cols = ['#FF4F91','#FFD93D','#00C9A7','#7B61FF','#FF7043','#fff'];
  for (let i = 0; i < 60; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.cssText = `left:${Math.random()*100}vw;top:-10px;background:${cols[i%cols.length]};animation-delay:${Math.random()*1}s;animation-duration:${1.5+Math.random()*1}s`;
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 3000);
  }
}

render();
</script>
</body>
</html>
